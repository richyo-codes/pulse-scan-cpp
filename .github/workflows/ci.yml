name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config clang

      - name: Ensure vcpkg downloads directory
        run: |
          VCPKG_DOWNLOADS="${VCPKG_DOWNLOADS:-/tmp/vcpkg-downloads}"
          mkdir -p "${VCPKG_DOWNLOADS}"
          echo "VCPKG_DOWNLOADS=${VCPKG_DOWNLOADS}" >> "${GITHUB_ENV}"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DBUILD_TESTING=ON
          -DCMAKE_C_COMPILER=${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120

  build-linux-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute git version
        run: |
          GIT_DESCRIBE="$(git describe --tags --always --dirty | tr '/ ' '--')"
          echo "GIT_DESCRIBE=${GIT_DESCRIBE}" >> "${GITHUB_ENV}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config

      - name: Ensure vcpkg directories
        run: |
          mkdir -p /tmp/vcpkg-downloads
          mkdir -p /tmp/vcpkg-cache
          echo "VCPKG_DOWNLOADS=/tmp/vcpkg-downloads" >> "${GITHUB_ENV}"
          echo "VCPKG_BINARY_SOURCES=clear;files,/tmp/vcpkg-cache,readwrite" >> "${GITHUB_ENV}"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=ninja
          -DPULSECAN_USE_VCPKG=ON
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --config Release

      - name: Stage linux x64 static binary
        run: |
          cp build/pulsescan-cpp "build/pulsescan-${GIT_DESCRIBE}-linux-x64-static"
          ls -lh "build/pulsescan-${GIT_DESCRIBE}-linux-x64-static"
          stat -c '%n %s bytes' "build/pulsescan-${GIT_DESCRIBE}-linux-x64-static"

      - name: Upload linux x64 static binary
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: pulsescan-linux-x64-static-${{ env.GIT_DESCRIBE }}
          path: build/pulsescan-*-linux-x64-static

  build-rpm-system:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc-c++ cmake ninja-build pkgconf-pkg-config \
            boost-devel cli11-devel catch2-devel \
            rpm-build git nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute git version
        run: |
          GIT_DESCRIBE="$(git describe --tags --always --dirty | tr '/ ' '--')"
          echo "GIT_DESCRIBE=${GIT_DESCRIBE}" >> "${GITHUB_ENV}"

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=ninja
          -DPULSECAN_USE_VCPKG=OFF
          -DPULSECAN_BUILD_ID="${GIT_DESCRIBE}"
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --config Release

      - name: Package (RPM)
        run: cpack --config build/CPackConfig.cmake -G RPM -B build/packages

      - name: Show RPM size (system)
        run: |
          ls -lh build/packages/*.rpm
          stat -c '%n %s bytes' build/packages/*.rpm

      - name: Upload RPM (system)
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: pulsescan-rpm-system-f43-${{ env.GIT_DESCRIBE }}
          path: build/packages/*.rpm

  build-rpm-static:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc-c++ cmake ninja-build pkgconf-pkg-config \
            rpm-build git nodejs curl zip unzip tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute git version
        run: |
          GIT_DESCRIBE="$(git describe --tags --always --dirty | tr '/ ' '--')"
          echo "GIT_DESCRIBE=${GIT_DESCRIBE}" >> "${GITHUB_ENV}"

      - name: Ensure vcpkg directories
        run: |
          mkdir -p /tmp/vcpkg-downloads
          mkdir -p /tmp/vcpkg-cache
          echo "VCPKG_DOWNLOADS=/tmp/vcpkg-downloads" >> "${GITHUB_ENV}"
          echo "VCPKG_BINARY_SOURCES=clear;files,/tmp/vcpkg-cache,readwrite" >> "${GITHUB_ENV}"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=ninja
          -DPULSECAN_USE_VCPKG=ON
          -DPULSECAN_BUILD_ID="${GIT_DESCRIBE}"
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --config Release

      - name: Package (RPM static)
        run: cpack --config build/CPackConfig.cmake -G RPM -B build/packages

      - name: Show RPM size (static)
        run: |
          ls -lh build/packages/*.rpm
          stat -c '%n %s bytes' build/packages/*.rpm

      - name: Upload RPM (static)
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: pulsescan-rpm-static-${{ env.GIT_DESCRIBE }}
          path: build/packages/*.rpm

  build-deb-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Ubuntu version tag
        run: |
          source /etc/os-release
          UBUNTU_TAG="ubuntu$(echo "${VERSION_ID:-0}" | tr -d '.')"
          echo "UBUNTU_VERSION_TAG=${UBUNTU_TAG}" >> "${GITHUB_ENV}"

      - name: Compute git version
        run: |
          GIT_DESCRIBE="$(git describe --tags --always --dirty | tr '/ ' '--')"
          echo "GIT_DESCRIBE=${GIT_DESCRIBE}" >> "${GITHUB_ENV}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config dpkg-dev \
            libboost-system-dev libcli11-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=ninja
          -DPULSECAN_USE_VCPKG=OFF
          -DPULSECAN_BUILD_ID="${GIT_DESCRIBE}"
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --config Release

      - name: Package (DEB)
        run: cpack --config build/CPackConfig.cmake -G DEB -B build/packages

      - name: Show DEB size (system)
        run: |
          ls -lh build/packages/*.deb
          stat -c '%n %s bytes' build/packages/*.deb

      - name: Upload DEB (system)
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: pulsescan-deb-system-${{ env.UBUNTU_VERSION_TAG }}-${{ env.GIT_DESCRIBE }}
          path: build/packages/*.deb

  build-deb-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute git version
        run: |
          GIT_DESCRIBE="$(git describe --tags --always --dirty | tr '/ ' '--')"
          echo "GIT_DESCRIBE=${GIT_DESCRIBE}" >> "${GITHUB_ENV}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config dpkg-dev

      - name: Ensure vcpkg directories
        run: |
          mkdir -p /tmp/vcpkg-downloads
          mkdir -p /tmp/vcpkg-cache
          echo "VCPKG_DOWNLOADS=/tmp/vcpkg-downloads" >> "${GITHUB_ENV}"
          echo "VCPKG_BINARY_SOURCES=clear;files,/tmp/vcpkg-cache,readwrite" >> "${GITHUB_ENV}"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=ninja
          -DPULSECAN_USE_VCPKG=ON
          -DPULSECAN_BUILD_ID="${GIT_DESCRIBE}"
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DBUILD_TESTING=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --config Release

      - name: Package (DEB static)
        run: cpack --config build/CPackConfig.cmake -G DEB -B build/packages

      - name: Show DEB size (static)
        run: |
          ls -lh build/packages/*.deb
          stat -c '%n %s bytes' build/packages/*.deb

      - name: Upload DEB (static)
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: pulsescan-deb-static-${{ env.GIT_DESCRIBE }}
          path: build/packages/*.deb
